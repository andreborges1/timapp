name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          DATABASE_URL: file:/tmp/dummy.db

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 5.161.237.132 >> ~/.ssh/known_hosts

      - name: Upload build to server
        run: |
          tar czf - --exclude=.next/cache .next | \
            ssh -i ~/.ssh/deploy_key root@5.161.237.132 \
              "tar xzf - -C /home/timapp/timapp"

      - name: Restart app
        run: |
          ssh -i ~/.ssh/deploy_key root@5.161.237.132 \
            "cd /home/timapp/timapp && prisma generate && pm2 restart timapp"
